<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'unsafe-inline' 'self'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Watch</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #050505;
      }

      #watch-desktop-titlebar {
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #050505;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        -webkit-app-region: drag;
        user-select: none;
      }

      .watch-desktop-title {
        padding-left: 14px;
        color: rgba(245, 245, 245, 0.62);
        font: 12px "Segoe UI", system-ui, sans-serif;
        line-height: 1;
      }

      .watch-desktop-window-controls {
        display: flex;
        height: 100%;
        -webkit-app-region: no-drag;
      }

      button {
        width: 54px;
        height: 36px;
        border: 0;
        border-radius: 0;
        display: grid;
        place-items: center;
        background: transparent;
        color: #a3a3a3;
        cursor: default;
        position: relative;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #f5f5f5;
      }

      button[data-action="close"]:hover {
        background: #b91c1c;
        color: #ffffff;
      }

      button:focus-visible {
        outline: 2px solid rgba(245, 245, 245, 0.72);
        outline-offset: -2px;
      }

      button::before,
      button::after {
        content: "";
        position: absolute;
        display: block;
        box-sizing: border-box;
      }

      button[data-action="minimize"]::before {
        width: 16px;
        height: 2px;
        border-radius: 999px;
        background: currentColor;
      }

      button[data-action="maximize"]::before {
        width: 15px;
        height: 15px;
        border: 2px solid currentColor;
        border-radius: 2px;
      }

      button[data-action="maximize"].is-maximized::before {
        width: 14px;
        height: 14px;
        transform: translate(-2px, 2px);
      }

      button[data-action="maximize"].is-maximized::after {
        width: 14px;
        height: 14px;
        border: 2px solid currentColor;
        border-radius: 2px;
        transform: translate(3px, -3px);
        background: #050505;
      }

      button[data-action="maximize"].is-maximized:hover::after {
        background: #121212;
      }

      button[data-action="close"]::before,
      button[data-action="close"]::after {
        width: 18px;
        height: 2px;
        border-radius: 999px;
        background: currentColor;
      }

      button[data-action="close"]::before {
        transform: rotate(45deg);
      }

      button[data-action="close"]::after {
        transform: rotate(-45deg);
      }
    </style>
  </head>
  <body>
    <div id="watch-desktop-titlebar" aria-label="桌面版視窗控制列">
      <div class="watch-desktop-title" data-app-version>Watch</div>
      <div class="watch-desktop-window-controls">
        <button type="button" data-action="minimize" aria-label="縮小" title="縮小"></button>
        <button type="button" data-action="maximize" aria-label="最大化" title="最大化"></button>
        <button type="button" data-action="close" aria-label="關閉" title="關閉"></button>
      </div>
    </div>
  </body>
</html>
